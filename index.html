<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 深色影视首页 - VIP视频解析</title>
<style>
/* 全局样式 */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1117;
    color:#fff;
    font-family:"Microsoft YaHei",sans-serif;
    min-height:100vh;
    padding-bottom:50px;
}

/* 公告栏 */
.notice{
    background:#1e293b;
    color:#00d8ff;
    padding:10px 20px;
    text-align:center;
    font-size:14px;
    border-bottom:1px solid #334155;
    position:relative;
    overflow:hidden;
}

.notice-text{
    display:inline-block;
    white-space:nowrap;
    animation: noticeScroll 15s linear infinite;
}

@keyframes noticeScroll {
    0% {transform: translateX(100%);}
    100% {transform: translateX(-100%);}
}

/* 头部 */
header{
    background:#1b1d25;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 3px 8px rgba(0,0,0,.4);
    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    font-size:24px;
    color:#00d8ff;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:8px;
}

/* 容器 */
.container{
    width:95%;
    max-width:1200px;
    margin:20px auto;
}

/* 轮播图 */
.banner{
    position:relative;
    height:300px;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.5);
}

.banner img{
    width:100%;
    height:300px;
    object-fit:cover;
    display:none;
    transition: opacity 0.5s ease;
}

.banner img.active{
    display:block;
    opacity:1;
}

.dots{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

.dot{
    display:inline-block;
    width:10px;
    height:10px;
    border-radius:50%;
    margin:4px;
    background:#666;
    cursor:pointer;
    transition: background 0.3s ease;
}

.dot.active{
    background:#00d8ff;
    transform:scale(1.2);
}

/* 搜索和解析区域 */
.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

#url{
    flex:1;
    height:45px;
    border:none;
    border-radius:8px;
    padding:10px 15px;
    font-size:16px;
    background:#1e293b;
    color:#fff;
    outline:none;
    transition: box-shadow 0.3s ease;
}

#url:focus{
    box-shadow:0 0 0 2px #00d8ff;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    background:#00bcd4;
    color:white;
    padding:0 20px;
    height:45px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition: all 0.3s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
}

button:hover{
    background:#00a0b6;
    transform:translateY(-2px);
}

button:active{
    transform:translateY(0);
}

/* 解析线路切换 */
.line-switch{
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.line-switch label{
    color:#00d8ff;
    font-size:14px;
}

#apiLine{
    height:40px;
    padding:0 10px;
    border-radius:8px;
    background:#1e293b;
    color:#fff;
    border:none;
    outline:none;
    cursor:pointer;
}

/* 播放器 */
.player-box{
    margin-bottom:30px;
}

iframe{
    width:100%;
    height:650px;
    background:#000;
    border:none;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.5);
}

/* 标签页切换 */
.tabs{
    display:flex;
    gap:0;
    margin:20px 0;
    border-bottom:1px solid #334155;
}

.tab-item{
    padding:12px 20px;
    background:#1e293b;
    cursor:pointer;
    transition: all 0.3s ease;
    border:none;
    height:auto;
}

.tab-item.active{
    background:#00bcd4;
    color:#fff;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* 收藏和播放记录 */
.favorite, .history{
    background:#1a1d26;
    border-radius:10px;
    padding:20px;
    margin-bottom:30px;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
}

.favorite h2, .history h2{
    margin-bottom:15px;
    color:#00d8ff;
    display:flex;
    align-items:center;
    gap:8px;
}

.item{
    padding:12px 15px;
    border-bottom:1px solid #333;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition: all 0.3s ease;
}

.item:hover{
    color:#00d8ff;
    background:rgba(0,216,255,0.1);
    border-radius:8px;
}

.item-actions{
    display:flex;
    gap:8px;
}

.item-btn{
    padding:5px 10px;
    font-size:12px;
    height:auto;
    background:#334155;
}

.item-btn:hover{
    background:#00d8ff;
}

/* 热门影视推荐 */
.hot-recommend{
    margin:30px 0;
}

.hot-recommend h2{
    margin-bottom:20px;
    color:#00d8ff;
    display:flex;
    align-items:center;
    gap:8px;
}

.card-list{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    transition: all 0.3s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 8px 20px rgba(0,0,0,.5);
}

.card-img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card-title{
    padding:15px;
    font-size:16px;
    text-align:center;
}

/* 返回顶部 */
.back-to-top{
    position:fixed;
    bottom:30px;
    right:30px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:#00bcd4;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
    transition: all 0.3s ease;
    opacity:0;
    pointer-events:none;
}

.back-to-top.show{
    opacity:1;
    pointer-events:auto;
}

.back-to-top:hover{
    background:#00a0b6;
    transform:scale(1.1);
}

/* 响应式布局 */
@media (max-width: 1024px) {
    iframe{
        height:500px;
    }
    .card-list{
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
}

@media (max-width: 768px) {
    header{
        padding:0 15px;
    }
    .logo{
        font-size:20px;
    }
    .banner{
        height:200px;
    }
    .banner img{
        height:200px;
    }
    iframe{
        height:400px;
    }
    .search-box{
        flex-direction:column;
    }
    .controls{
        width:100%;
    }
    button{
        flex:1;
        padding:0 10px;
    }
    .card-list{
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .card-img{
        height:220px;
    }
}

@media (max-width: 480px) {
    .banner{
        height:150px;
    }
    .banner img{
        height:150px;
    }
    iframe{
        height:300px;
    }
    .card-list{
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
    .card-img{
        height:180px;
    }
    .back-to-top{
        width:40px;
        height:40px;
        bottom:20px;
        right:20px;
    }
}
</style>
</head>
<body>
<!-- 公告栏 -->
<div class="notice">
    <div class="notice-text">📢 欢迎使用VIP视频解析工具 | 支持主流视频平台解析 | 请勿传播非法内容 📢</div>
</div>

<!-- 头部 -->
<header>
    <div class="logo">
        🎬 深色影视首页
    </div>
</header>

<!-- 主容器 -->
<div class="container">
    <!-- 轮播Banner -->
    <div class="banner">
        <img class="active" src="https://picsum.photos/id/1015/1200/300" alt="轮播图1">
        <img src="https://picsum.photos/id/1018/1200/300" alt="轮播图2">
        <img src="https://picsum.photos/id/1024/1200/300" alt="轮播图3">
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <!-- 搜索和解析区域 -->
    <div class="search-box">
        <input id="url" placeholder="请输入视频网址" onkeydown="if(event.keyCode===13)play()">
        <div class="controls">
            <button onclick="play()">
                📺 解析播放
            </button>
            <button onclick="favorite()">
                ⭐ 收藏
            </button>
            <button onclick="copyUrl()">
                📋 复制地址
            </button>
        </div>
    </div>

    <!-- 解析线路切换 -->
    <div class="line-switch">
        <label>🔗 解析线路：</label>
        <select id="apiLine" onchange="changeApiLine()">
            <option value="https://jx.playerjy.com/?url=">线路1（默认）</option>
            <option value="https://www.ckmov.vip/jx/?url=">线路2</option>
            <option value="https://jx.aidouer.net/?url=">线路3</option>
            <option value="https://jiexi.071811.cc/jx/?url=">线路4</option>
        </select>
    </div>

    <!-- 播放器 -->
    <div class="player-box">
        <iframe id="player" frameborder="0"></iframe>
    </div>

    <!-- 标签页切换 -->
    <div class="tabs">
        <button class="tab-item active" onclick="switchTab('recommend')">🎞️ 热门推荐</button>
        <button class="tab-item" onclick="switchTab('favorite')">⭐ 我的收藏</button>
        <button class="tab-item" onclick="switchTab('history')">🕒 最近播放</button>
    </div>

    <!-- 热门影视推荐 -->
    <div id="recommend" class="tab-content active">
        <div class="hot-recommend">
            <h2>🎞️ 热门影视推荐</h2>
            <div class="card-list">
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1001/400/600" alt="影视1">
                    <div class="card-title">热门电影1</div>
                </div>
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1002/400/600" alt="影视2">
                    <div class="card-title">热门电影2</div>
                </div>
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1003/400/600" alt="影视3">
                    <div class="card-title">热门电影3</div>
                </div>
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1004/400/600" alt="影视4">
                    <div class="card-title">热门电影4</div>
                </div>
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1005/400/600" alt="影视5">
                    <div class="card-title">热门电影5</div>
                </div>
                <div class="card">
                    <img class="card-img" src="https://picsum.photos/id/1006/400/600" alt="影视6">
                    <div class="card-title">热门电影6</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 收藏列表 -->
    <div id="favorite" class="tab-content favorite">
        <h2>⭐ 我的收藏</h2>
        <div id="favoriteList"></div>
    </div>

    <!-- 最近播放 -->
    <div id="history" class="tab-content history">
        <h2>🕒 最近播放记录</h2>
        <div id="historyList"></div>
    </div>
</div>

<!-- 返回顶部 -->
<div class="back-to-top" onclick="backToTop()">
    ⬆️
</div>

<script>
// 全局变量
let currentApi = "https://jx.playerjy.com/?url=";
let historyMaxLength = 20; // 播放记录最大条数

// 1. 轮播图功能
let index = 0;
let imgs = document.querySelectorAll(".banner img");
let dots = document.querySelectorAll(".dot");

function show(i) {
    imgs.forEach(x => {
        x.classList.remove("active");
        x.style.opacity = 0;
    });
    dots.forEach(x => x.classList.remove("active"));
    imgs[i].classList.add("active");
    imgs[i].style.opacity = 1;
    dots[i].classList.add("active");
}

// 自动轮播
let carouselTimer = setInterval(() => {
    index++;
    if (index >= imgs.length) index = 0;
    show(index);
}, 3000);

// 点击轮播点切换
dots.forEach((d, i) => {
    d.onclick = () => {
        clearInterval(carouselTimer);
        index = i;
        show(index);
        // 重新启动轮播
        carouselTimer = setInterval(() => {
            index++;
            if (index >= imgs.length) index = 0;
            show(index);
        }, 3000);
    };
});

// 2. 切换解析线路
function changeApiLine() {
    currentApi = document.getElementById("apiLine").value;
}

// 3. 解析播放功能
function play() {
    let url = document.getElementById("url").value.trim();
    if (!url) {
        alert("请输入视频网址！");
        return;
    }
    
    // 设置播放器地址
    document.getElementById("player").src = currentApi + encodeURIComponent(url);
    
    // 添加到播放记录
    addToHistory(url);
}

// 4. 收藏功能
function favorite() {
    let url = document.getElementById("url").value.trim();
    if (!url) {
        alert("请输入视频网址！");
        return;
    }

    let favorites = JSON.parse(localStorage.getItem("favorite") || "[]");
    if (!favorites.includes(url)) {
        favorites.unshift(url);
        localStorage.setItem("favorite", JSON.stringify(favorites));
        alert("收藏成功！");
    } else {
        alert("该链接已收藏！");
    }
    renderFavoriteList();
}

// 5. 渲染收藏列表
function renderFavoriteList() {
    let favorites = JSON.parse(localStorage.getItem("favorite") || "[]");
    let html = "";
    if (favorites.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:#666;">暂无收藏内容</div>';
    } else {
        favorites.forEach(v => {
            html += `
            <div class="item" onclick="loadUrl('${v.replace(/'/g,"\\'")}')">
                <span>${v}</span>
                <div class="item-actions">
                    <button class="item-btn" onclick="copyUrlSingle('${v.replace(/'/g,"\\'")}')">复制</button>
                    <button class="item-btn" onclick="removeFavorite('${v.replace(/'/g,"\\'")}')">删除</button>
                </div>
            </div>
            `;
        });
    }
    document.getElementById("favoriteList").innerHTML = html;
}

// 6. 移除收藏
function removeFavorite(url) {
    let favorites = JSON.parse(localStorage.getItem("favorite") || "[]");
    favorites = favorites.filter(item => item !== url);
    localStorage.setItem("favorite", JSON.stringify(favorites));
    renderFavoriteList();
}

// 7. 添加播放记录
function addToHistory(url) {
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    // 去重
    history = history.filter(item => item !== url);
    // 添加到开头
    history.unshift(url);
    // 限制长度
    if (history.length > historyMaxLength) {
        history = history.slice(0, historyMaxLength);
    }
    localStorage.setItem("history", JSON.stringify(history));
    renderHistoryList();
}

// 8. 渲染播放记录
function renderHistoryList() {
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    let html = "";
    if (history.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:#666;">暂无播放记录</div>';
    } else {
        history.forEach(v => {
            html += `
            <div class="item" onclick="loadUrl('${v.replace(/'/g,"\\'")}')">
                <span>${v}</span>
                <div class="item-actions">
                    <button class="item-btn" onclick="copyUrlSingle('${v.replace(/'/g,"\\'")}')">复制</button>
                    <button class="item-btn" onclick="removeHistory('${v.replace(/'/g,"\\'")}')">删除</button>
                </div>
            </div>
            `;
        });
    }
    document.getElementById("historyList").innerHTML = html;
}

// 9. 移除播放记录
function removeHistory(url) {
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    history = history.filter(item => item !== url);
    localStorage.setItem("history", JSON.stringify(history));
    renderHistoryList();
}

// 10. 加载URL并播放
function loadUrl(url) {
    document.getElementById("url").value = url;
    play();
}

// 11. 复制当前输入框URL
function copyUrl() {
    let url = document.getElementById("url").value.trim();
    if (!url) {
        alert("暂无可复制的地址！");
        return;
    }
    navigator.clipboard.writeText(url).then(() => {
        alert("地址复制成功！");
    }).catch(() => {
        // 备用复制方案
        let input = document.createElement("input");
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);
        alert("地址复制成功！");
    });
}

// 12. 复制单个URL
function copyUrlSingle(url) {
    navigator.clipboard.writeText(url).then(() => {
        alert("地址复制成功！");
    }).catch(() => {
        let input = document.createElement("input");
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);
        alert("地址复制成功！");
    });
}

// 13. 标签页切换
function switchTab(tabName) {
    // 切换标签按钮状态
    document.querySelectorAll(".tab-item").forEach(item => {
        item.classList.remove("active");
    });
    event.target.classList.add("active");
    
    // 切换内容区域
    document.querySelectorAll(".tab-content").forEach(item => {
        item.classList.remove("active");
    });
    document.getElementById(tabName).classList.add("active");
}

// 14. 返回顶部
function backToTop() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

// 15. 监听滚动显示返回顶部按钮
window.onscroll = function() {
    let backToTopBtn = document.querySelector(".back-to-top");
    if (window.scrollY > 300) {
        backToTopBtn.classList.add("show");
    } else {
        backToTopBtn.classList.remove("show");
    }
};

// 初始化渲染
window.onload = function() {
    renderFavoriteList();
    renderHistoryList();
};
</script>
</body>
</html>
